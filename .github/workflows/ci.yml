name: CI

# Cross-platform test signal for PRs and main. Linux carries the strict quality
# gate, macOS also compiles the native menu app, and Windows runs natively.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The platform the widget actually ships on. Until this existed, Linux was
  # only exercised *after* a tag was pushed — by which point the tag is
  # immutable and a failure costs a new patch release.
  linux:
    name: test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --all-targets --locked

      - name: Test GNOME marker logic
        run: node gnome-extension/marker-logic.test.mjs

      - name: Unused dependencies
        uses: bnjbvr/cargo-machete@v0.9.2

  macos:
    name: test (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --all-targets --locked

      # The menu bar app is a single Swift file with no Xcode project. Build it
      # to prove it still compiles, then run the pure-logic test harness
      # (arc geometry, TOML enabled parsing, vendor balance dispatch).
      - name: Build the menu bar app
        run: swiftc -O -parse-as-library -o /tmp/ai-usagebar-menubar macos/ai-usagebar-menubar.swift

      - name: Run the menu bar test harness
        run: ./macos/run-tests.sh

  windows:
    name: test (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # ring assembles its primitives on x86_64 and needs nasm; the runner does
      # not ship it on PATH. No-op if a future image already provides it.
      - uses: ilammy/setup-nasm@v1

      - name: Test
        run: cargo test --all-targets --locked

      - name: Test GNOME marker logic
        run: node gnome-extension/marker-logic.test.mjs
